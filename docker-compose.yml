version: '3.8'

services:
  app:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:/app/data/ai-hub.db
      - RUST_LOG=info
    volumes:
      - ./data:/app/data
    restart: unless-stopped
